name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: clippy, rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Show tool versions
        run: |
          rustc --version
          cargo --version
          docker --version
          docker compose version

      - name: Check formatting
        run: cargo fmt --check

      - name: Run unit tests
        run: cargo test --workspace

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Start stack for session-isolation regression
        run: docker compose up -d

      - name: Wait for core health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9091/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "cc-blackbox-core did not become healthy in time"
          exit 1

      - name: Run parallel session regression
        run: bash test/parallel-sessions.sh 4

      - name: Stop stack before end-to-end smoke test
        if: always()
        run: docker compose down -t 5 || true

      - name: Run end-to-end smoke test
        run: bash test/e2e.sh

      - name: Capture docker compose state on failure
        if: failure()
        run: |
          mkdir -p /tmp/cc-blackbox-ci
          docker compose ps > /tmp/cc-blackbox-ci/compose-ps.txt 2>&1 || true
          docker compose logs --no-color > /tmp/cc-blackbox-ci/compose-logs.txt 2>&1 || true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-compose-logs
          path: /tmp/cc-blackbox-ci

      - name: Tear down stack
        if: always()
        run: docker compose down -t 5 || true

  installer:
    name: Installer syntax
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check install.sh syntax
        run: sh -n install.sh
