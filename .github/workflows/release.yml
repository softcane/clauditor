name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-15-intel
            target: x86_64-apple-darwin
            cross: false
          - os: macos-14
            target: aarch64-apple-darwin
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check crate version matches tag
        shell: bash
        run: |
          set -euo pipefail
          crate_version="$(awk -F'"' '/^version = / { print $2; exit }' clauditor-cli/Cargo.toml)"
          test "v${crate_version}" = "$GITHUB_REF_NAME"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release -p clauditor-cli --target "${{ matrix.target }}"
          else
            cargo build --release -p clauditor-cli --target "${{ matrix.target }}"
          fi

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          archive="clauditor-${target}.tar.gz"
          staging="dist/${target}"
          mkdir -p "$staging"
          cp "target/${target}/release/clauditor" "$staging/clauditor"
          cp README.md LICENSE "$staging/"
          tar -czf "dist/${archive}" -C "$staging" clauditor README.md LICENSE
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${archive}" > "dist/${archive}.sha256"
          else
            shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: clauditor-${{ matrix.target }}
          path: |
            dist/clauditor-${{ matrix.target }}.tar.gz
            dist/clauditor-${{ matrix.target }}.tar.gz.sha256

  docker-image:
    name: Build and push clauditor-core image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check crate version matches tag
        shell: bash
        run: |
          set -euo pipefail
          crate_version="$(awk -F'"' '/^version = / { print $2; exit }' clauditor-cli/Cargo.toml)"
          test "v${crate_version}" = "$GITHUB_REF_NAME"

      - name: Set image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/clauditor-core"
          {
            echo "image=${image}"
            echo "tag=${tag}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./clauditor-core/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=gha,scope=clauditor-core-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=clauditor-core-${{ matrix.arch }}
          tags: |
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.tag }}-${{ matrix.arch }}
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.version }}-${{ matrix.arch }}

  docker-manifest:
    name: Publish clauditor-core image manifest
    runs-on: ubuntu-latest
    needs:
      - docker-image
    steps:
      - name: Set image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/clauditor-core"
          {
            echo "image=${image}"
            echo "tag=${tag}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish manifest
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.tags.outputs.image }}"
          tag="${{ steps.tags.outputs.tag }}"
          version="${{ steps.tags.outputs.version }}"
          docker buildx imagetools create \
            -t "${image}:${tag}" \
            -t "${image}:${version}" \
            -t "${image}:latest" \
            "${image}:${tag}-amd64" \
            "${image}:${tag}-arm64"

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-cli
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: clauditor-*
          merge-multiple: true

      - name: Create release
        shell: bash
        run: |
          set -euo pipefail
          assets=(
            dist/clauditor-*.tar.gz
            dist/clauditor-*.tar.gz.sha256
            install.sh
          )
          notes="Install with: curl -fsSL https://raw.githubusercontent.com/softcane/clauditor/main/install.sh | sh"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "$notes"
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" --title "$GITHUB_REF_NAME" --notes "$notes"
          fi
