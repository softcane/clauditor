name: Release

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.5.1"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name || github.ref_name }}

jobs:
  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-15-intel
            target: x86_64-apple-darwin
            cross: false
          - os: macos-14
            target: aarch64-apple-darwin
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name || github.ref_name }}

      - name: Check crate version matches tag
        shell: bash
        run: |
          set -euo pipefail
          case "$RELEASE_TAG" in
            v*.*.*) ;;
            *)
              echo "::error::Release tag must look like vMAJOR.MINOR.PATCH, got ${RELEASE_TAG}"
              exit 1
              ;;
          esac
          cli_version="$(awk -F'"' '/^version = / { print $2; exit }' cc-blackbox-cli/Cargo.toml)"
          core_version="$(awk -F'"' '/^version = / { print $2; exit }' cc-blackbox-core/Cargo.toml)"
          for crate in "cc-blackbox-cli:${cli_version}" "cc-blackbox-core:${core_version}"; do
            name="${crate%%:*}"
            version="${crate#*:}"
            if [[ "v${version}" != "$RELEASE_TAG" ]]; then
              echo "::error::${name} version ${version} does not match release tag ${RELEASE_TAG}"
              exit 1
            fi
          done

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release -p cc-blackbox-cli --target "${{ matrix.target }}"
          else
            cargo build --release -p cc-blackbox-cli --target "${{ matrix.target }}"
          fi

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          archive="cc-blackbox-${target}.tar.gz"
          staging="dist/${target}"
          mkdir -p "$staging"
          cp "target/${target}/release/cc-blackbox" "$staging/cc-blackbox"
          cp README.md LICENSE "$staging/"
          tar -czf "dist/${archive}" -C "$staging" cc-blackbox README.md LICENSE
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${archive}" > "dist/${archive}.sha256"
          else
            shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cc-blackbox-${{ matrix.target }}
          path: |
            dist/cc-blackbox-${{ matrix.target }}.tar.gz
            dist/cc-blackbox-${{ matrix.target }}.tar.gz.sha256

  docker-image:
    name: Build and push cc-blackbox-core image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name || github.ref_name }}

      - name: Check crate version matches tag
        shell: bash
        run: |
          set -euo pipefail
          case "$RELEASE_TAG" in
            v*.*.*) ;;
            *)
              echo "::error::Release tag must look like vMAJOR.MINOR.PATCH, got ${RELEASE_TAG}"
              exit 1
              ;;
          esac
          cli_version="$(awk -F'"' '/^version = / { print $2; exit }' cc-blackbox-cli/Cargo.toml)"
          core_version="$(awk -F'"' '/^version = / { print $2; exit }' cc-blackbox-core/Cargo.toml)"
          for crate in "cc-blackbox-cli:${cli_version}" "cc-blackbox-core:${core_version}"; do
            name="${crate%%:*}"
            version="${crate#*:}"
            if [[ "v${version}" != "$RELEASE_TAG" ]]; then
              echo "::error::${name} version ${version} does not match release tag ${RELEASE_TAG}"
              exit 1
            fi
          done

      - name: Set image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          version="${tag#v}"
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/cc-blackbox-core"
          {
            echo "image=${image}"
            echo "tag=${tag}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./cc-blackbox-core/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=gha,scope=cc-blackbox-core-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=cc-blackbox-core-${{ matrix.arch }}
          tags: |
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.tag }}-${{ matrix.arch }}
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.version }}-${{ matrix.arch }}

  docker-manifest:
    name: Publish cc-blackbox-core image manifest
    runs-on: ubuntu-latest
    needs:
      - docker-image
    steps:
      - name: Set image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          version="${tag#v}"
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/cc-blackbox-core"
          {
            echo "image=${image}"
            echo "tag=${tag}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish manifest
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.tags.outputs.image }}"
          tag="${{ steps.tags.outputs.tag }}"
          version="${{ steps.tags.outputs.version }}"
          docker buildx imagetools create \
            -t "${image}:${tag}" \
            -t "${image}:${version}" \
            -t "${image}:latest" \
            "${image}:${tag}-amd64" \
            "${image}:${tag}-arm64"

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-cli
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name || github.ref_name }}

      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: cc-blackbox-*
          merge-multiple: true

      - name: Create release
        shell: bash
        run: |
          set -euo pipefail
          assets=(
            dist/cc-blackbox-*.tar.gz
            dist/cc-blackbox-*.tar.gz.sha256
            install.sh
          )
          notes="Install with: curl -fsSL https://raw.githubusercontent.com/softcane/cc-blackbox/main/install.sh | sh"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "$notes"
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --title "$RELEASE_TAG" --notes "$notes"
          fi
