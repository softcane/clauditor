// Minimal subset of envoy processing_mode proto for cc-blackbox.
// Source: https://github.com/envoyproxy/envoy/blob/main/api/envoy/extensions/filters/http/ext_proc/v3/processing_mode.proto

syntax = "proto3";

package envoy.extensions.filters.http.ext_proc.v3;

message ProcessingMode {
  // How to handle request/response headers.
  enum HeaderSendMode {
    DEFAULT = 0;
    SEND = 1;
    SKIP = 2;
  }

  // How to handle request/response bodies.
  enum BodySendMode {
    NONE = 0;
    STREAMED = 1;
    BUFFERED = 2;
    BUFFERED_PARTIAL = 3;
  }

  HeaderSendMode request_header_mode = 1;
  HeaderSendMode response_header_mode = 2;
  BodySendMode request_body_mode = 3;
  BodySendMode response_body_mode = 4;
  HeaderSendMode request_trailer_mode = 5;
  HeaderSendMode response_trailer_mode = 6;
}
