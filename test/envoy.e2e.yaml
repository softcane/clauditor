# cc-blackbox E2E Envoy proxy.
# This config mirrors envoy/envoy.yaml, but routes Anthropic traffic to the
# deterministic fake upstream in test/docker-compose.e2e.yml.

admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

static_resources:
  listeners:
    - name: anthropic_listener
      per_connection_buffer_limit_bytes: 67108864
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: anthropic_proxy
                codec_type: AUTO
                use_remote_address: true
                internal_address_config:
                  cidr_ranges: []
                max_request_headers_kb: 64
                request_headers_timeout: 10s
                request_timeout: 60s
                stream_idle_timeout: 600s

                route_config:
                  name: anthropic_route
                  virtual_hosts:
                    - name: anthropic
                      domains: ["*"]
                      routes:
                        - match:
                            path: "/v1/messages"
                            headers:
                              - name: ":method"
                                string_match:
                                  exact: "POST"
                          route:
                            cluster: anthropic_upstream
                            timeout: 0s
                            idle_timeout: 600s
                            host_rewrite_literal: fake-anthropic
                        - match:
                            path: "/v1/messages/count_tokens"
                            headers:
                              - name: ":method"
                                string_match:
                                  exact: "POST"
                          route:
                            cluster: anthropic_upstream
                            timeout: 60s
                            host_rewrite_literal: fake-anthropic
                        - match:
                            prefix: "/"
                          direct_response:
                            status: 404
                            body:
                              inline_string: "cc-blackbox only forwards Anthropic /v1/messages requests\n"

                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          timestamp: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          status: "%RESPONSE_CODE%"
                          duration_ms: "%DURATION%"
                          bytes_rx: "%BYTES_RECEIVED%"
                          bytes_tx: "%BYTES_SENT%"
                          upstream: "%UPSTREAM_HOST%"
                          request_id: "%REQ(X-REQUEST-ID)%"
                          response_flags: "%RESPONSE_FLAGS%"

                http_filters:
                  - name: envoy.filters.http.ext_proc
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                      grpc_service:
                        envoy_grpc:
                          cluster_name: cc_blackbox_ext_proc
                      failure_mode_allow: true
                      message_timeout: 10s
                      processing_mode:
                        request_header_mode: SEND
                        request_body_mode: BUFFERED
                        response_header_mode: SEND
                        response_body_mode: STREAMED

                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: anthropic_upstream
      type: STRICT_DNS
      dns_lookup_family: V4_ONLY
      connect_timeout: 2s
      per_connection_buffer_limit_bytes: 67108864
      load_assignment:
        cluster_name: anthropic_upstream
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: fake-anthropic
                      port_value: 8000

    - name: cc_blackbox_ext_proc
      type: STRICT_DNS
      connect_timeout: 1s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: cc_blackbox_ext_proc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: cc-blackbox-core
                      port_value: 50051
