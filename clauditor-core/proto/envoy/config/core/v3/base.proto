// Minimal subset of envoy base proto for clauditor.
// Source: https://github.com/envoyproxy/envoy/blob/main/api/envoy/config/core/v3/base.proto
// Field numbers verified against envoy v1.32.

syntax = "proto3";

package envoy.config.core.v3;

import "google/protobuf/any.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/wrappers.proto";

// Header name/value pair.
message HeaderValue {
  string key = 1;
  string value = 2;
  bytes raw_value = 3;
}

// Header name/value pair plus option to control append behavior.
message HeaderValueOption {
  enum HeaderAppendAction {
    APPEND_IF_EXISTS_OR_ADD = 0;
    ADD_IF_ABSENT = 1;
    OVERWRITE_IF_EXISTS_OR_ADD = 2;
    OVERWRITE_IF_EXISTS = 3;
  }

  HeaderValue header = 1;
  google.protobuf.BoolValue append = 2 [deprecated = true];
  HeaderAppendAction append_action = 3;
  bool keep_empty_value = 4;
}

// A set of HTTP headers.
message HeaderMap {
  repeated HeaderValue headers = 1;
}

// Metadata for a filter.
message Metadata {
  map<string, google.protobuf.Struct> filter_metadata = 1;
  map<string, google.protobuf.Any> typed_filter_metadata = 2;
}
