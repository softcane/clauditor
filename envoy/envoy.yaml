# cc-blackbox Envoy proxy — Phase 2: ext_proc integration.
# Forwards all processing phases to cc-blackbox-core for observation.

admin:
  address:
    socket_address:
      # Keep Envoy's admin API private to the container. It should not be
      # reachable from other containers or from an accidental host port publish.
      address: 127.0.0.1
      port_value: 9901

static_resources:
  listeners:
    - name: anthropic_listener
      # Request bodies are buffered for session identity, so set an explicit
      # ceiling instead of relying on Envoy defaults. Responses remain streamed.
      per_connection_buffer_limit_bytes: 67108864
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: anthropic_proxy
                codec_type: AUTO
                use_remote_address: true
                # Treat all downstream IPs as external. The proxy is host-loopback
                # published, so Docker bridge RFC1918 addresses should not gain
                # trusted internal header semantics.
                internal_address_config:
                  cidr_ranges: []
                max_request_headers_kb: 64
                request_headers_timeout: 10s
                request_timeout: 60s

                # SSE streaming: allow long active streams, but close dead ones.
                stream_idle_timeout: 600s

                route_config:
                  name: anthropic_route
                  virtual_hosts:
                    - name: anthropic
                      domains: ["*"]
                      routes:
                        - match:
                            path: "/v1/messages"
                            headers:
                              - name: ":method"
                                string_match:
                                  exact: "POST"
                          route:
                            cluster: anthropic_upstream
                            # Route timeout is incompatible with long streaming
                            # responses; stream_idle_timeout handles dead peers.
                            timeout: 0s
                            idle_timeout: 600s
                            host_rewrite_literal: api.anthropic.com
                        - match:
                            path: "/v1/messages/count_tokens"
                            headers:
                              - name: ":method"
                                string_match:
                                  exact: "POST"
                          route:
                            cluster: anthropic_upstream
                            timeout: 60s
                            host_rewrite_literal: api.anthropic.com
                        - match:
                            prefix: "/"
                          direct_response:
                            status: 404
                            body:
                              inline_string: "cc-blackbox only forwards Anthropic /v1/messages requests\n"

                # Access log: every request with status, duration, upstream info.
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          timestamp: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          status: "%RESPONSE_CODE%"
                          duration_ms: "%DURATION%"
                          bytes_rx: "%BYTES_RECEIVED%"
                          bytes_tx: "%BYTES_SENT%"
                          upstream: "%UPSTREAM_HOST%"
                          request_id: "%REQ(X-REQUEST-ID)%"
                          response_flags: "%RESPONSE_FLAGS%"

                http_filters:
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      inline_code: |
                        local function strip_beta_query(path)
                          local base, query = string.match(path, "^([^?]+)%?(.*)$")
                          if base == nil then
                            return path
                          end
                          if base ~= "/v1/messages" and base ~= "/v1/messages/count_tokens" then
                            return path
                          end

                          local kept = {}
                          for param in string.gmatch(query, "([^&]+)") do
                            local name = string.match(param, "^([^=]*)") or param
                            if string.lower(name) ~= "beta" then
                              table.insert(kept, param)
                            end
                          end

                          if #kept == 0 then
                            return base
                          end
                          return base .. "?" .. table.concat(kept, "&")
                        end

                        function envoy_on_request(handle)
                          local headers = handle:headers()
                          local path = headers:get(":path")
                          if path == nil then
                            return
                          end
                          local rewritten = strip_beta_query(path)
                          if rewritten ~= path then
                            headers:replace(":path", rewritten)
                          end
                        end

                  # ext_proc: send all phases to cc-blackbox-core for observation.
                  - name: envoy.filters.http.ext_proc
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                      grpc_service:
                        envoy_grpc:
                          cluster_name: cc_blackbox_ext_proc
                      # If cc-blackbox-core is down, traffic still flows.
                      failure_mode_allow: true
                      message_timeout: 10s
                      processing_mode:
                        request_header_mode: SEND
                        request_body_mode: BUFFERED
                        # CRITICAL: STREAMED so we see SSE chunks individually.
                        response_header_mode: SEND
                        response_body_mode: STREAMED

                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # Upstream: Anthropic API over TLS.
    - name: anthropic_upstream
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      connect_timeout: 10s
      per_connection_buffer_limit_bytes: 67108864
      load_assignment:
        cluster_name: anthropic_upstream
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: api.anthropic.com
                      port_value: 443
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: api.anthropic.com
          common_tls_context:
            validation_context:
              trusted_ca:
                filename: /etc/ssl/certs/ca-certificates.crt

    # ext_proc: cc-blackbox-core gRPC service (HTTP/2 required).
    - name: cc_blackbox_ext_proc
      type: STRICT_DNS
      connect_timeout: 1s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: cc_blackbox_ext_proc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: cc-blackbox-core
                      port_value: 50051
