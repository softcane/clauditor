# Clauditor Envoy proxy — Phase 2: ext_proc integration.
# Forwards all processing phases to clauditor-core for observation.

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: anthropic_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: anthropic_proxy
                codec_type: AUTO

                # SSE streaming: don't idle-timeout the stream.
                stream_idle_timeout: 300s

                route_config:
                  name: anthropic_route
                  virtual_hosts:
                    - name: anthropic
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: anthropic_upstream
                            timeout: 300s
                            host_rewrite_literal: api.anthropic.com

                # Access log: every request with status, duration, upstream info.
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          timestamp: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          status: "%RESPONSE_CODE%"
                          duration_ms: "%DURATION%"
                          bytes_rx: "%BYTES_RECEIVED%"
                          bytes_tx: "%BYTES_SENT%"
                          upstream: "%UPSTREAM_HOST%"
                          request_id: "%REQ(X-REQUEST-ID)%"
                          response_flags: "%RESPONSE_FLAGS%"

                http_filters:
                  # ext_proc: send all phases to clauditor-core for observation.
                  - name: envoy.filters.http.ext_proc
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                      grpc_service:
                        envoy_grpc:
                          cluster_name: clauditor_ext_proc
                      # If clauditor-core is down, traffic still flows.
                      failure_mode_allow: true
                      message_timeout: 10s
                      processing_mode:
                        request_header_mode: SEND
                        request_body_mode: BUFFERED
                        # CRITICAL: STREAMED so we see SSE chunks individually.
                        response_header_mode: SEND
                        response_body_mode: STREAMED

                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # Upstream: Anthropic API over TLS.
    - name: anthropic_upstream
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      connect_timeout: 10s
      load_assignment:
        cluster_name: anthropic_upstream
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: api.anthropic.com
                      port_value: 443
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: api.anthropic.com
          common_tls_context:
            validation_context:
              trusted_ca:
                filename: /etc/ssl/certs/ca-certificates.crt

    # ext_proc: clauditor-core gRPC service (HTTP/2 required).
    - name: clauditor_ext_proc
      type: STRICT_DNS
      connect_timeout: 1s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: clauditor_ext_proc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: clauditor-core
                      port_value: 50051
